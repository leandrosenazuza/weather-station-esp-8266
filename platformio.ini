; Sem isto, `pio run` tenta compilar todos os environments (ex.: native + ESP).
[platformio]
default_envs = nodemcuv2

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 115200
test_ignore = test_sensors
lib_deps =
  adafruit/Adafruit BMP085 Library
  claws/BH1750
  adafruit/Adafruit SSD1306
  adafruit/Adafruit GFX Library
  adafruit/DHT sensor library

[env:native_test]
platform = native
test_framework = unity
test_build_src = true
test_filter = test_sensors
build_flags =
  -D UNIT_TEST
  -I test/test_sensors/mocks
build_src_filter =
  +<Dht11Sensor.cpp>
  +<Bmp180Sensor.cpp>
  +<Bh1750Sensor.cpp>
  -<main.cpp>
  -<DisplayPresenter.cpp>
  -<SerialReporter.cpp>
  -<WeatherStationApp.cpp>
